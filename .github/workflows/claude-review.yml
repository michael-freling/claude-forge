name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]

# Only one review per PR at a time; cancel superseded runs.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and bot-authored PRs.
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The OAuth token above is provisioned via the update-ci-secrets
          # tool (now in github.com/michael-freling/claude-code-tools).
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }}.

            Focus on:
            - Correctness and error handling.
            - Test coverage — CI enforces 90% (excluding generated mocks); flag
              new exported functions that lack tests.
            - Adherence to the conventions in CLAUDE.md, especially the key
              invariants for container flags and MCP settings.
            - Security of any changes to auth, gateway, or kubeconfig/RBAC code.

            Leave concise, actionable feedback as inline review comments and a
            short summary comment. Only flag substantive issues — do not nitpick
            style that golangci-lint already enforces.
          claude_args: |
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(go build:*),Bash(go vet:*)"
